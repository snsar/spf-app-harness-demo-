# GPSR Compliance Engine — local nginx site (one domain, reuses the quotesnap pattern).
# Mirrors b2b.quotesnap.local.conf: HTTPS self-signed/mkcert, CORS + OPTIONS preflight,
# but routed for GPSR: SPA frontend at /, Go backend (port 8000) at /api and /auth.
#
# Install: see deploy/setup-local.sh (run with sudo). cert via mkcert.
# NOTE: /etc/hosts makes this domain resolve ONLY on THIS machine. Shopify's servers
# cannot reach it, so the Shopify-initiated OAuth callback/webhooks will not arrive
# here — same constraint as any localhost setup. Browser-initiated flows work.
# A public tunnel (shopify app dev) or a real public domain (F9) is required for
# Shopify to call back.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name gpsr.quotesnap.local;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name gpsr.quotesnap.local;

    ssl_certificate     /etc/nginx/ssl/gpsr.local.crt;
    ssl_certificate_key /etc/nginx/ssl/gpsr.local.key;

    client_max_body_size 20M;
    access_log off;
    error_log off;

    # Backend (Go + Gin on 127.0.0.1:8000): OAuth install flow + session-token API
    # + Shopify product webhooks. /auth* = OAuth endpoints; /api/* = embedded API;
    # /webhooks/* = Shopify-initiated POSTs (raw-body HMAC verified in the backend,
    # see handler/webhook.go). `webhooks` MUST stay in this alternation or Shopify
    # webhook deliveries 404 at the edge (F3b §7).
    #
    # CSP: the backend sets `Content-Security-Policy: frame-ancestors ...`
    # (handler.EmbeddedCSP). It is deliberately NOT in the proxy_hide_header list
    # below, so it passes through unmodified. DO NOT add CSP to proxy_hide_header
    # and DO NOT set a conflicting X-Frame-Options here — the embedded iframe /
    # clickjacking guard depends on frame-ancestors surviving (F3b §5/§7).
    location ~ ^/(api|auth|healthz|webhooks) {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Vary                             Origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Content-Type,Authorization,X-Requested-With" always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Vary                             Origin always;
        add_header Access-Control-Allow-Credentials true always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000;
    }

    # Frontend SPA — TWO modes (swap by commenting/uncommenting):
    #
    # DEV MODE (default here): Vite dev server on :5173. HMR works; no build step.
    # Swap to PROD MODE before deploying to a real domain.
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5173;
    }

    # PROD MODE: serve the pre-built Vite dist/ directly from disk.
    # Run `cd frontend && npm ci && npm run build` first to populate dist/.
    # To activate: comment out the proxy block above and uncomment this block.
    #
    # location / {
    #     root  /path/to/repo/frontend/dist;
    #     index index.html;
    #     # SPA fallback: any route that is not a real file serves index.html so
    #     # React Router can handle client-side navigation on refresh / direct URL.
    #     try_files $uri $uri/ /index.html;
    #     # Static assets emitted by Vite carry a content hash in the filename
    #     # (e.g. assets/index-Bk9y2A3C.js) so they can be cached aggressively.
    #     location ~* ^/assets/ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }
}
